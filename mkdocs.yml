# ============================================================
# PORTFOLIO CONFIGURATION
# This file is in the YAML format and is very sensitive to 
# spaces. Ensure to match the indentation level and spacing
# of new items with existing ones

# Edit all lines marked [YOUR ...] to customize your site
# ============================================================

site_name: "Yashas Ramesh - Geospatial Portfolio"
site_description: "Portfolio of Yashas Ramesh — GIS, Remote Sensing,UAV and LiDAR"
site_author: "Yashas Ramesh"
# After your site is live, uncomment and set this to your actual GitHub Pages URL:
#site_url: "https://your-username.github.io/your-repo-name"

theme:
  name: material
  # Icon used as both the site logo (header) and browser favicon.
  # Browse icons at https://squidfunk.github.io/mkdocs-material/reference/icons-emojis/
  # and replace "material/earth" with any "material/..." icon name you prefer.
  icon:
    logo: material/satellite-variant
  palette:
    # To change the color, edit the 'primary' and 'accent' values below for both
    # the 'default' (light) and 'slate' (dark) schemes.
    # Available colors: red, pink, purple, deep purple, indigo, blue, light blue,
    # cyan, teal, green, light green, lime, yellow, amber, orange, deep orange
    - scheme: default            # Light mode
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate              # Dark mode
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs            # Top-level nav items shown as horizontal tabs
    - navigation.top             # Back-to-top button when scrolling up
    - content.code.copy          # Copy button on all code blocks
  font:
    text: Roboto
    code: Roboto Mono

extra_css:
  - assets/css/extra.css

markdown_extensions:
  - md_in_html        # Allows Markdown inside HTML blocks (used for project cards)
  - attr_list         # Allows adding CSS classes to elements: ![img](url){ .class }
  - admonition        # Note/warning/tip boxes
  - pymdownx.details  # Collapsible admonition blocks
  - pymdownx.superfences
  - tables
  - pymdownx.emoji:   # Renders :material-icon: and :fontawesome-brands-icon: inline icons
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

copyright: "Copyright &copy; Yashas Ramesh"

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/YashasRamesh8
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/YashasRamesh
    - icon: material/email
      link: mailto:yashramesh812@gmail.com


plugins:
  - search
  - meta
  - mkdocs-jupyter

nav:
  - Home: index.md
  - Projects:
    - "All Projects": projects/index.md
    - "Forest Fire Risk Zonation": projects/FFRD_Chikmagaluru.md
    - "Potential Fishing Zone (PFZ) Mapping": projects/PFZ_MiniProject.md
    - "MCDR 2026 QC Checklist": projects/MCDR2026_QC_Checklist.ipynb
    - "GCP Workflow Notebook": projects/GCPs_IBM_deliverables_workflow.ipynb
    - "GCP Validation Notebook": projects/GCPs_IBM_deliverables_validation.ipynb
    - "Crop-Water Productivity (ACIWRM)": projects/Crop_Productivity.md
    - "Rainfall Data Validation (ACIWRM)": projects/Rainfall_Data_Validation.md
  - Presentations: publications.md
  - Experience: experience.md
  - Contact: contact.md
